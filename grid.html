<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>grid</title>
  </head>
  <body>
    <div style="display: grid; grid-template-columns: 100px 100px 100px">
      <div style="background-color: brown">100px</div>
      <div style="background-color: blue">100px</div>
      <div style="background-color: gray">100px</div>
    </div>

    <div
      style="
        display: grid;
        grid-template-columns: 300px 100px 100px;
        margin-top: 20px;
      "
    >
      <div style="background-color: brown">300px</div>
      <div style="background-color: blue; height: 100px">100px</div>
      <div style="background-color: gray">100px</div>
    </div>

    <div
      style="display: grid; grid-template-columns: 100px 1fr; margin-top: 20px"
    >
      <div style="background-color: gray">100px</div>
      <div style="background-color: teal">1fr</div>
    </div>

    <div
      style="
        display: grid;
        grid-template-columns: 100px 2fr 1fr;
        margin-top: 20px;
      "
    >
      <div style="background-color: gray">100px</div>
      <div style="background-color: teal">2fr</div>
      <div style="background-color: indigo">1fr</div>
    </div>

    <div
      style="
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        column-gap: 10px;
        row-gap: 20px;
        margin-top: 20px;
      "
    >
      <div style="background-color: gray; height: 200px">1fr</div>
      <div style="background-color: teal; height: 200px">1fr</div>
      <div style="background-color: indigo; height: 200px">1fr</div>
      <div style="background-color: gray; height: 200px">1fr</div>
      <div style="background-color: teal; height: 200px">1fr</div>
      <div style="background-color: indigo; height: 200px">1fr</div>
      <div style="background-color: gray; height: 200px">1fr</div>
      <div style="background-color: teal; height: 200px">1fr</div>
    </div>
  </body>
</html>
