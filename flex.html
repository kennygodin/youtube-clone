<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex practice</title>
  </head>
  <body>
    <div style="display: flex; flex-direction: row">
      <div style="background-color: lightblue">div 1</div>
      <div style="background-color: lightgreen">div 2</div>
    </div>

    <div style="display: flex; flex-direction: row; margin-top: 20px">
      <div style="background-color: lightblue; width: 100px">100px</div>
      <div style="background-color: lightgreen; flex: 1">flex 1</div>
    </div>

    <div style="display: flex; flex-direction: row; margin-top: 20px">
      <div style="background-color: lightblue; width: 200px">200px</div>
      <div style="background-color: lightgreen; flex: 3">flex 1</div>
      <div style="background-color: lightcoral; flex: 2">flex 2</div>
      <div style="background-color: lightpink; flex: 1">flex 1</div>
    </div>

    <div
      style="
        display: flex;
        flex-direction: row;
        height: 50px;
        margin-top: 20px;
        border: 1px solid;
        justify-content: center;
      "
    >
      <div style="background-color: lightblue; width: 300px">300px</div>
      <div style="background-color: lightgreen; width: 300px">300px</div>
      <div style="background-color: lightskyblue; width: 300px">300px</div>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        height: 50px;
        margin-top: 20px;
        border: 1px solid;
        justify-content: space-between;
      "
    >
      <div style="background-color: lightblue; width: 300px">300px</div>
      <div style="background-color: lightgreen; width: 300px">300px</div>
      <div style="background-color: lightskyblue; width: 300px">300px</div>
    </div>
  </body>
</html>
