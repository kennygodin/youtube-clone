<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position practice</title>
  </head>
  <body
    style="
      height: 1000px;
      padding: 0;
      margin: 0;
      padding-top: 60px;
      padding-left: 80px;
    "
  >
    <div
      style="
        background-color: black;
        color: white;
        height: 50px;
        position: fixed;
        top: 0px;
        left: 0;
        right: 0;
      "
    >
      Header bar
    </div>

    <div
      style="
        background-color: lightseagreen;
        position: fixed;
        top: 50px;
        left: 0px;
        bottom: 0px;
        width: 70px;
      "
    >
      <div
        style="
          background-color: red;
          color: white;
          width: 30px;
          height: 30px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          position: absolute;
          top: 0;
          right: 0;
        "
      >
        x
      </div>
    </div>

    <div
      style="
        height: 200px;
        width: 200px;
        background-color: lightblue;
        position: static;
      "
    >
      div 1
    </div>
    <div
      style="
        height: 200px;
        width: 200px;
        background-color: lightpink;
        position: static;
      "
    >
      div 1
    </div>
  </body>
</html>
